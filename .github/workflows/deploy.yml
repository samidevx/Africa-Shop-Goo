name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build

      - name: Generate static routes (eliminates SPA redirect)
        run: |
          PRODUCT_IDS=$(node -e "const p=require('./src/data/products.json'); console.log(p.map(x=>x.id).join(' '))")
          for ID in $PRODUCT_IDS; do
            mkdir -p dist/product/$ID
            cp dist/index.html dist/product/$ID/index.html
            echo "  Created: dist/product/$ID/index.html"
          done
          mkdir -p dist/merci
          cp dist/index.html dist/merci/index.html
          echo "  Created: dist/merci/index.html"
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
