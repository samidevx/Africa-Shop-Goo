    <!-- UTM Capture: Must run BEFORE SPA redirect to avoid losing params -->
    <script type="text/javascript">
      (function() {
        try {
          var search = window.location.search;
          if (!search && window.location.href.indexOf('/?/') !== -1) {
            var raw = window.location.href.split('/?/')[1] || '';
            var qIdx = raw.indexOf('&');
            if (qIdx !== -1) search = '?' + raw.substring(qIdx + 1);
          }
          var params = new URLSearchParams(search);
          var utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
          utms.forEach(function(k) { if (params.get(k)) sessionStorage.setItem(k, params.get(k)); });
        } catch(e) {}
      })();
    </script>

    <script type="text/javascript">
      // Start Single Page Apps for GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
      // End Single Page Apps for GitHub Pages
    </script>
    
    <!-- Meta Pixel: deferred so it doesn't block FCP -->
    <script>
      window.addEventListener('load', function() {
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '931050979555225');
        fbq('track', 'PageView');
      });
    </script>
    <!-- End Meta Pixel Code -->
